<section class="feedback section" id="feedback">
  <div class="container feedback__container">
    <div class="section-head">
      <h2 class="section-title"><!-- Feedback title --></h2>
      <p class="section-text"><!-- Feedback subtitle --></p>
    </div>

    <div class="feedback__slider swiper js-feedback-slider">
      <div class="swiper-wrapper">
        <!-- Feedback slides go here -->
      </div>
    </div>

    <div class="feedback__controls">
      <button class="feedback__button js-feedback-prev" type="button" aria-label="Попередній слайд">
        Prev
      </button>
      <div class="feedback__pagination js-feedback-pagination"></div>
      <button class="feedback__button js-feedback-next" type="button" aria-label="Наступний слайд">
        Next
      </button>
    </div>
  </div>
</section>
